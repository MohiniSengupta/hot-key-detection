spring.application.name=hot-key-detection
server.port=8080

spring.data.redis.host=localhost
spring.data.redis.port=6379

management.endpoints.web.exposure.include=health,metrics

# Hot-key detection (Step 7): in-memory counts per video, closed every window-ms.
# First scheduler tick runs after one full window (see HotKeyTracker @Scheduled initialDelay).
# Quiet windows do not clear writesLastBusyWindow / hotKeys on GET /api/admin/hot-keys.
app.hotkey.window-ms=10000
app.hotkey.threshold-writes=50
